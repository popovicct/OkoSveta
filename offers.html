<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Ponude | Oko sveta</title>
        
        <meta name="description" content="Pogledajte naše ponude, tražite destinacije po državi, datumu ili tipu putovanja - Turistička agencija Oko sveta">
        <meta name="keywords" content="ponude putovanja,  jeftina putovanja, države, oko sveta">
        <meta property="og:title" content="Ponude | Oko sveta">
        <meta property="og:description" content="Pogledajte naše ponude i pronađite destinaciju za Vaše sledeće putovanje.">
        <meta property="og:image" content="assets/img/logo1.png">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="Oko sveta">
        <meta property="og:url" content="https://popovicct.github.io/OkoSveta/offers">
        <link rel="shortcut icon" href="assets/img/logo1.png"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="assets/css/style.css"/>
       
    </head>
    <body>
        <div id="container" class="container-fluid px-0">
        <nav class="navigation navbar navbar-expand-lg justify-content-between w-100 addColor navbar-dark"></nav>
        <section id="searchFilter" class="row d-flex align-items-center my-5 ">
            <div class="mt-3 col-lg-2 col-md-4 col-9">
                 <input type="text" id="searchDestination" placeholder="Pretražite destinaciju" class="form-control"/>
            </div>
               
            <div class="mt-3 col-lg-2 col-md-4 col-9">
                <select id="filterCountry" class="form-select">
                    <option value="all">Sve države</option>
                </select>
            </div>
            <div class="mt-3 col-lg-2 col-md-4 col-9">
                <select id="filterCategory" class="form-select">
                    <option value="all">Sve kategorije</option>
                </select>
            </div>  
            <div class="mt-3 col-lg-2 col-md-4 col-9">
                <input type="date" id="dateOffer" name="dateOffer" class="form-control"/>
            </div>   

            <div class="mt-3 col-lg-2 col-md-4 col-9">
                <select id="sort" class="form-select">
                    <option value="default">Nema sortiranja</option>
                    <option value="countryAsc">Po državi A-Z</option>
                    <option value="priceAsc">Po ceni rastuće</option>
                    <option value="priceDesc">Po ceni opadajuće</option>
                </select>
            </div>   
            
            <div class="mt-3 col-lg-2 col-md-4 col-9">
                 <div id="saveToFav" class="d-flex gap-1">
                    <span id="heart"></span>
                    <p id="showFav">Prikaži omiljeno </p>
                    <span id="countFav"></span>
                </div>
            </div>
                
               
        </section>
        
        <section id="allOffers" class="row g-4 mb-5 px-3"></section>
        <div id="paginationBtn" class="d-flex justify-content-center mt-5 mb-4 gap-2">
        </div>  
        <footer class="d-flex flex-column"></footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/main.js"></script>
    </body>
</html>
