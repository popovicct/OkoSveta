<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Prijava | Oko sveta</title>
        <meta name="description" content="Brzo i lako se prijavite za putovanje, potrebno je samo da popunite formu za prijavu!">
        <meta name="keywords" content="prijava, putovanje, oko sveta">
        <meta property="og:title" content="Prijava | Oko sveta">
        <meta property="og:description" content="Brza i laka prijava na putovanje! Sve što je potrebno je da popunite formu.">
        <meta property="og:image" content="assets/img/logo1.png">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="Oko sveta">
        <link rel="shortcut icon" href="assets/img/logo1.png"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="assets/css/style.css"/>
        
    </head>
    <body>
        <div id="container" class="container-fluid px-0">
            <nav class="navigation navbar navbar-expand-lg justify-content-between w-100 addColor navbar-dark"></nav>
            <div class="row d-flex justify-content-center align-items-start mt-5 mb-5" >
                <div class="col-lg-4 col-11">
                    <div id="booking" class="ms-4 mb-5">
                        <h3 class="mb-4">Prijavite se na putovanje:</h3>
                        <div id="infoDestination" class=""></div>
                    </div>
                    <div class="d-flex flex-column ms-4">
                        <p class="mb-1">Izaberite datum:</p>
                        <select id="choseDate" class="col-12 mb-5 p-1 rounded-3"></select>
                    </div>
                </div>
    
                <form action="#" method="get" id="bookingForm" class="ms-5 col-lg-7 col-11 ">
                                
                     <div class="form-group d-flex flex-column mb-3">
                        <label for="inputName">Ime i prezime *</label>
                        <input type="text" id="inputName" name="name" placeholder="Primer: Petar Petrović" class="defaultInput mt-1 col-lg-7 col-11 rounded-3" required/>
                        <div id="nameFeedback" class="feedback d-flex gap-1"></div>
                    </div>
                    <div class="form-group d-flex flex-column mb-3">
                        <label for="inputMail">Email *</label>
                        <input type="email" id="inputMail" name="mail" placeholder="Primer: petar@gmail.com" class="defaultInput mt-1 col-lg-7 col-11 rounded-3" required/>
                        <div id="mailFeeedback" class="feedback d-flex gap-1"></div>
                    </div>
                    <div class="form-group d-flex flex-column mb-3">
                        <label for="phone">Telefon *</label>
                        <input type="text" id="phone" name="phone" placeholder="Primer: 629876543" class="defaultInput mt-1 col-lg-7 col-11 rounded-3" required/>
                        <div id="phoneFeeedback" class="feedback d-flex gap-1"></div>
                    </div>

                    <p>Pol *</p>
                    <div id="radioStyle" class="d-flex mb-3">
                        <div class="form-radio">
                            <input type="radio" id="maleRadio" name="gender" value="male" required/>
                            <label for="maleRadio">Muško</label>
                        </div>
                        <div class="form-radio ps-3">
                            <input type="radio" id="femaleRadio" name="gender" value="female"/>
                            <label for="femaleRadio">Žensko</label>
                        </div>
                        <div id="radioFeeedback" class="feedback d-flex gap-1"></div>
                    </div>

                    <div class="consent ">
                        <div class="d-flex align-items-start gap-2">
                            <input type="checkbox" id="consent" name="consent" required class="mt-1"/>
                            <label for="consent">Pročitao sam i saglasan sam sa uslovima plaćanja navedenim u ponudi.</label>
                        </div>
                        <div id="checkFeeedback" class="feedback d-flex gap-1 mb-3"></div>
                    </div>
                    <div class="form-group d-flex flex-column">
                        <label for="messageBooking">Ukoliko imate pitanje ili nešto da nam saopštite bitno za putovanje napišite ovde:</label>
                        <textarea id="messageBooking" name="message" placeholder="Napišite poruku..."  class="defaultInput mt-1 col-lg-7 col-11 rounded-3" required></textarea>
                        <div id="messageFeedbackBooking" class="feedback mb-2"></div>
                    </div>
                     <button type="submit" id="submitBooking" class="btn text-white rounded-3 btn-read-more mt-3 mb-5 col-lg-2 col-4">Prijavi me</button>
                     <div id="toastMessage"></div>
                </form>
            </div>
            <footer class="d-flex flex-column"></footer>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/main.js"></script>
    </body>
</html>
